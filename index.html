<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tehniško komuniciranje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>TEHNIŠKO KOMUNICIRANJE</h1>
</header>

<main class="container">

    <section class="project-card">
        <div class="project-header">
            <h2>PRIMEŽ</h2>
        </div>
        
        <div class="project-body">
            <div class="gallery">
                <h3>Predogled</h3>
                <img src="slike/primez_glavna.jpg" alt="Sestavljen primež">
                <div class="thumbnails">
                    <img src="slike/primez_eksplozijska.jpg" alt="Eksplozijska risba">
                    <img src="slike/primez_tloris.jpg" alt="Tehniški načrt">
                </div>
            </div>

            <div class="downloads">
                <h3>Datoteke za prenos</h3>
                <ul class="file-list">
                    <li>
                        <span>Ohišje primeža</span>
                        <a href="modeli/primez/ohisje.step" class="btn">Prenesi</a>
                    </li>
                    <li>
                        <span>Pomični del</span>
                        <a href="modeli/primez/pomicni_del.step" class="btn">Prenesi</a>
                    </li>
                    <li>
                        <span>Gibalna čeljust</span>
                        <a href="modeli/primez/celjust.step" class="btn">Prenesi</a>
                    </li>
                    <li>
                        <span>Navojno vreteno</span>
                        <a href="modeli/primez/vreteno.step" class="btn">Prenesi</a>
                    </li>
                    <li class="zip-item">
                        <span><strong>VSE KOMPONENTE (ZIP)</strong></span>
                        <a href="modeli/primez/primez_komplet.zip" class="btn btn-zip">Prenesi vse</a>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    </main>

<footer>
    <p>&copy; 2026 Tehniško komuniciranje</p>
</footer>

</body>
</html>
